# ── Source scout: weekly, Claude hunts for NEW sources matching your taste
scout:
  enabled: true
  day: Sunday        # runs before that day's digest
  max_new_sources: 3 # added to a trial list; your thumbs keep or kill them

# ── Deep read: fetch & skim shortlisted articles before final ranking
deep_read:
  enabled: true
  shortlist_size: 18     # triage pass narrows ~200 candidates to this
  excerpt_chars: 1600    # how much of each article the final judge reads

# ── Serendipity: surface what you'd love but don't know to ask for
interestingness: >
  The core hook is the intersection of beauty, systems, and human behavior —
  things that reveal the invisible forces shaping people: incentives, rituals,
  symbols, status, identity, feedback loops. Expressive, playful surfaces with
  deep structure underneath. Obsessive craft and people who went unreasonably
  deep on one narrow thing. The edge where physical and digital meet. Frontier
  environments (early internet cultures, scenes, art movements, emerging youth
  culture) where social systems are visible before they harden into institutions.
  Category-blurring: art that functions as community, software as self-expression,
  mythology as product design, technology as culture. Hidden systems that quietly
  run the world; deep time; how brains construct reality; the strange history of
  ordinary objects. Technical novelty alone rarely hooks him — it lands when it
  changes how people feel, relate, create, or organize.

serendipity:
  wildcards_per_day: 1     # items deliberately OUTSIDE stated interests
  explore_topics:          # rotating pool; one is injected into each day's hunt
    - materials science and metamaterials
    - neuroscience of perception and illusion
    - animal cognition and communication
    - computational design and generative architecture
    - the history of labyrinths, mazes, and wayfinding
    - optics, light art, and how vision works
    - sound design, synthesis, and psychoacoustics
    - infrastructure and how cities actually work
    - deep sea and space imaging
    - the economics of craft and manufacturing
    - cartography and the history of maps
    - biomimicry and natural engineering
    - horology and precision mechanics
    - typography and the history of letterforms
    - fermentation, food science, and metabolic health
    - robotics, actuators, and haptics
    - archaeology and experimental history
    - mycology and weird biology
    - the Situationist International and psychogeography
    - nightclub architecture and social choreography of spaces
    - religion as a system — ritual, symbol, and cohesion
    - Japanese Metabolist architecture
    - media archaeology — dead networks that predicted the future
    - luxury branding history — how objects become symbols
    - ethology — signaling, hierarchy, and play in animals
    - experimental education movements
    - Renaissance courts and patronage systems
    - second-order cybernetics and self-organizing systems
    - temporary autonomous zones, festivals, pop-up communities
    - fashion anthropology — clothing as identity technology
    - new religious movements and how shared meaning forms
    - environmental psychology — how spaces alter behavior unnoticed
    - amateur naturalism — obsessive attention to the physical world

# ── Anti-interests: hard negative signal — never spend a slot on these
anti_interests:
  - generic productivity content or optimization theater
  - mainstream business media collapsing into quarterly metrics and career advice
  - pure technical deep-dives with no human/cultural consequence
  - generic self-help and motivational content
  - celebrity news, franchise discourse, algorithmic pop-culture commentary

# ── Taste picks: art the curator thinks you'd love, tied to your signature
taste_picks:
  enabled: true
  count: 3   # roughly one film/show, one visual-art piece, one song — mix varies by day

# ── NYC events: concerts, museum shows, pop-ups matching your taste
events:
  enabled: true
  city: New York City
  count: 5
  lookahead_days: 14
