name: more-on-demand

on:
  schedule:
    - cron: "*/15 * * * *"   # cheap IMAP check; only runs the full pipeline if requested
  workflow_dispatch:
    inputs:
      force:
        description: "Build a supplemental edition right now, skipping the email check"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Check for a 'more' request
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          FORCE_MORE: ${{ github.event.inputs.force }}
        run: python -m src.check_more

      - name: Commit state + site (only changes if a supplement was built)
        run: |
          git config user.name  "daily-digest"
          git config user.email "actions@users.noreply.github.com"
          git add state/ docs/ config.yaml
          git commit -m "supplemental $(date -u +%Y-%m-%dT%H:%M)" || echo "nothing to commit"
          git push
