name: daily-digest

on:
  schedule:
    # 07:30 America/New_York. GitHub cron is UTC, so 11:30 UTC.
    # (shifts 1h with daylight saving; adjust if you care about the exact minute)
    - cron: "30 11 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write         # so the run can commit updated state/archive

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Build and send digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: python -m src.main

      - name: Commit state + archive
        run: |
          git config user.name  "daily-digest"
          git config user.email "actions@users.noreply.github.com"
          git add state/ docs/
          git commit -m "digest $(date -u +%Y-%m-%d)" || echo "nothing to commit"
          git push
